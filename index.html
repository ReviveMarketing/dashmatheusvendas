<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendasPro - Dashboard Executivo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <!-- Bibliotecas Base -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
        
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }

        .bsc-table-row:hover { background-color: rgba(99, 102, 241, 0.05); }
        .transition-theme { transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-theme">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, 
            PieChart, Pie, Cell, AreaChart, Area 
        } = window.Recharts;

        const apiKey = ""; 

        // Unidades solicitadas: SC, MG, CE e Geral
        const BRAZIL_STATES = ['Geral', 'SC', 'MG', 'CE'];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const STATUS_OPTIONS = [
            { id: 'aguardando', label: 'Aguardando Resposta', color: '#6366f1' },
            { id: 'fechado', label: 'Fechado', color: '#10b981' },
            { id: 'negociacao', label: 'Negociação', color: '#f59e0b' },
            { id: 'sem_dados', label: 'Sem Dados', color: '#64748b' },
            { id: 'sem_possibilidade', label: 'Sem Possibilidade', color: '#ef4444' },
            { id: 'visita', label: 'Visita Corriqueira', color: '#8b5cf6' },
        ];

        const PROCESS_OPTIONS = [
            { id: 'seguro_dpvat_ipa', label: 'SEGURO DPVAT (IPA)' },
            { id: 'seguro_dpvat_mac', label: 'SEGURO DPVAT (MAC/ÓBITO)' },
            { id: 'seguro_vida_ind', label: 'SEGURO DE VIDA (INDIVIDUAL)' },
            { id: 'seguro_vida_emp', label: 'SEGURO DE VIDA (EMPRESARIAL)' },
            { id: 'seguro_vida_obt', label: 'SEGURO DE VIDA (ÓBITO)' },
            { id: 'seguro_terceiro', label: 'SEGURO TERCEIRO' },
            { id: 'aux_doenca', label: 'AUX. DOENÇA' },
            { id: 'aux_acidente', label: 'AUX. ACIDENTE' },
            { id: 'aux_maternidade', label: 'AUX. MATERNIDADE' },
            { id: 'bpc_loas', label: 'BPC/LOAS' },
            { id: 'apos_invalidez', label: 'APOSENTADORIA POR INVALIDEZ' },
            { id: 'pensao_morte', label: 'PENSÃO POR MORTE' },
            { id: 'revisoes_dpvat', label: 'REVISÕES JUDICIAIS (DPVAT)' },
            { id: 'acao_transito', label: 'AÇÃO DE ACIDENTE DE TRÂNSITO' },
            { id: 'fraudes_pix', label: 'FRAUDES/GOLPES PIX' },
            { id: 'suspensao_cnh', label: 'SUSPENSÃO DE CNH E RECURSO DE MULTAS' },
            { id: 'inventario', label: 'INVENTÁRIO' },
            { id: 'revisoes_vida', label: 'REVISÕES JUDICIAIS (SEGURO DE VIDA)' },
            { id: 'revisoes_terc', label: 'REVISÕES JUDICIAIS (SEGURO TERCEIRO)' },
            { id: 'trabalhista', label: 'TRABALHISTA' },
            { id: 'seguro_vida_app', label: 'SEGURO DE VIDA (APLICATIVO)' },
            { id: 'resp_civil', label: 'AÇÃO DE RESPONSABILIDADE CIVIL' },
            { id: 'apos_idade', label: 'APOSENTADORIA POR IDADE' },
            { id: 'apos_tempo', label: 'APOSENTADORIA POR TEMPO DE SERVIÇO' },
            { id: 'reintegracao', label: 'REINTEGRAÇÃO DE POSSE' },
            { id: 'terceiro_judicial', label: 'TERCEIRO JUDICIAL' },
        ];

        const App = () => {
            const [data, setData] = useState([]);
            const [consultants, setConsultants] = useState([]);
            const [bscData, setBscData] = useState({});
            const [theme, setTheme] = useState('dark');
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [newConsultantName, setNewConsultantName] = useState('');
            const [registrationDate, setRegistrationDate] = useState(new Date().toISOString().split('T')[0]);
            const [formData, setFormData] = useState({ aguardando: 0, fechado: 0, negociacao: 0, sem_dados: 0, sem_possibilidade: 0, visita: 0 });
            
            const [currentBscMonth, setCurrentBscMonth] = useState(new Date().toISOString().substring(0, 7));
            const [selectedBscState, setSelectedBscState] = useState('Geral');
            
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [aiAdvice, setAiAdvice] = useState(null);
            const [bscComp1, setBscComp1] = useState("");
            const [bscComp2, setBscComp2] = useState("");

            useEffect(() => {
                const savedData = localStorage.getItem('vendaspro_data');
                if (savedData) setData(JSON.parse(savedData));
                const savedCons = localStorage.getItem('vendaspro_cons');
                if (savedCons) setConsultants(JSON.parse(savedCons));
                const savedBsc = localStorage.getItem('vendaspro_bsc');
                if (savedBsc) setBscData(JSON.parse(savedBsc));
                const savedTheme = localStorage.getItem('vendaspro_theme');
                if (savedTheme) setTheme(savedTheme);
            }, []);

            useEffect(() => {
                localStorage.setItem('vendaspro_data', JSON.stringify(data));
                localStorage.setItem('vendaspro_cons', JSON.stringify(consultants));
                localStorage.setItem('vendaspro_bsc', JSON.stringify(bscData));
                localStorage.setItem('vendaspro_theme', theme);
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [data, consultants, bscData, theme]);

            const handleThemeToggle = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

            const handleSaveRecord = () => {
                const newEntry = {
                    id: Date.now(),
                    consultant: "Geral",
                    date: new Date(registrationDate + "T12:00:00").toISOString(),
                    values: { ...formData }
                };
                setData([newEntry, ...data]);
                setFormData({ aguardando: 0, fechado: 0, negociacao: 0, sem_dados: 0, sem_possibilidade: 0, visita: 0 });
                setActiveTab('dashboard');
            };

            const updateBscValue = (field, value) => {
                setBscData(prev => {
                    const monthData = prev[currentBscMonth] || {};
                    const stateData = monthData[selectedBscState] || {};
                    return {
                        ...prev,
                        [currentBscMonth]: {
                            ...monthData,
                            [selectedBscState]: {
                                ...stateData,
                                [field]: value === '' ? 0 : Number(value)
                            }
                        }
                    };
                });
            };

            const getBscMetrics = (month, state = 'Geral') => {
                const monthData = bscData[month] || {};
                const values = monthData[state] || {};
                
                const invMeta = values.investmentMeta || 0;
                const invGoogle = values.investmentGoogle || 0;
                const totalInv = invMeta + invGoogle;
                const leadsT = values.leadsTraffic || 0;
                const leadsO = values.leadsOrganic || 0;
                const totalL = leadsT + leadsO;
                const closedT = values.closedTraffic || 0;
                const closedO = values.closedOrganic || 0;
                const totalC = closedT + closedO;
                const cpl = leadsT > 0 ? (totalInv / leadsT) : 0;
                const cac = closedT > 0 ? (totalInv / closedT) : 0;
                
                return { ...values, totalInv, totalL, totalC, cpl, cac, leadsT, leadsO, closedT, closedO };
            };

            const currentBsc = useMemo(() => getBscMetrics(currentBscMonth, selectedBscState), [bscData, currentBscMonth, selectedBscState]);

            const callGeminiAI = async () => {
                setIsAnalyzing(true);
                setAiAdvice(null);
                const prompt = `Analise os dados da Unidade ${selectedBscState === 'Geral' ? 'Brasil' : selectedBscState} no mês ${currentBscMonth}: Inv: R$ ${currentBsc.totalInv}, Leads: ${currentBsc.totalL}, Fechados: ${currentBsc.totalC}, CPL: R$ ${currentBsc.cpl.toFixed(2)}. Dê 3 dicas curtas e práticas para melhorar o tráfego e conversão.`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const result = await response.json();
                    setAiAdvice(result.candidates?.[0]?.content?.parts?.[0]?.text);
                } catch (err) { setAiAdvice("Erro na análise da IA."); } finally { setIsAnalyzing(false); }
            };

            const bscComparison = useMemo(() => {
                if (!bscComp1 || !bscComp2) return null;
                const m1 = getBscMetrics(bscComp1, selectedBscState);
                const m2 = getBscMetrics(bscComp2, selectedBscState);
                const calcDiff = (v1, v2) => ({ diff: v2 - v1, percent: v1 > 0 ? ((v2 - v1) / v1 * 100).toFixed(1) : (v2 > 0 ? 100 : 0) });
                return { inv: calcDiff(m1.totalInv, m2.totalInv), leads: calcDiff(m1.totalL, m2.totalL), closed: calcDiff(m1.totalC, m2.totalC), cpl: calcDiff(m1.cpl, m2.cpl), m1, m2 };
            }, [bscData, bscComp1, bscComp2, selectedBscState]);

            const stats = useMemo(() => {
                const totalFechado = data.reduce((acc, curr) => acc + Number(curr.values.fechado || 0), 0);
                const totalLeads = data.reduce((acc, curr) => acc + STATUS_OPTIONS.reduce((sAcc, s) => sAcc + Number(curr.values[s.id] || 0), 0), 0);
                const totalProcessos = data.reduce((acc, curr) => acc + PROCESS_OPTIONS.reduce((pAcc, p) => pAcc + Number(curr.values[p.id] || 0), 0), 0);
                const conversion = totalLeads > 0 ? ((totalFechado / totalLeads) * 100).toFixed(1) : 0;
                const top = [...consultants].sort((a, b) => b.monthlyClosed - a.monthlyClosed)[0];
                return { totalFechado, totalLeads, totalProcessos, conversion, topConsultant: top?.name || "N/A" };
            }, [data, consultants]);

            const Card = ({ title, children, icon, className = "" }) => (
                <div className={`bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm transition-theme ${className}`}>
                    <div className="flex items-center justify-between mb-4">
                        <h3 className="text-slate-500 dark:text-slate-400 font-semibold text-xs uppercase tracking-widest">{title}</h3>
                        {icon && <Icon name={icon} className="text-indigo-500" />}
                    </div>
                    {children}
                </div>
            );

            return (
                <div className="min-h-screen transition-theme">
                    {/* Sidebar */}
                    <nav className="fixed left-0 top-0 h-full w-20 md:w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col z-50 transition-theme shadow-lg md:shadow-none">
                        <div className="p-6 mb-8 flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                <Icon name="trending-up" className="text-white" />
                            </div>
                            <span className="hidden md:block font-bold text-xl tracking-tighter">Vendas<span className="text-indigo-500">Pro</span></span>
                        </div>
                        <div className="flex-1 px-4 space-y-2">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: 'bar-chart-2' },
                                { id: 'bsc', label: 'BSC Marketing', icon: 'pie-chart' },
                                { id: 'input', label: 'Novo Registro', icon: 'plus-circle' },
                                { id: 'consultants', label: 'Consultores', icon: 'users' },
                                { id: 'compare', label: 'Histórico', icon: 'calendar' },
                            ].map((item) => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                                    <Icon name={item.icon} />
                                    <span className="hidden md:block font-medium">{item.label}</span>
                                </button>
                            ))}
                        </div>
                        <div className="p-6 border-t border-slate-200 dark:border-slate-800">
                            <button onClick={handleThemeToggle} className="w-full flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-indigo-500 dark:hover:text-indigo-400 transition-all rounded-xl">
                                <Icon name={theme === 'dark' ? 'sun' : 'moon'} />
                                <span className="hidden md:block font-medium">{theme === 'dark' ? 'Modo Claro' : 'Modo Escuro'}</span>
                            </button>
                        </div>
                    </nav>

                    <main className="pl-20 md:pl-64 min-h-screen transition-theme">
                        <header className="p-6 md:p-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <h1 className="text-4xl font-extrabold tracking-tight">Executivo</h1>
                                <p className="text-slate-500 dark:text-slate-400">Gerenciamento de unidades e performance estratégica.</p>
                            </div>
                        </header>

                        <div className="px-6 md:px-10 pb-10 space-y-8">
                            {activeTab === 'dashboard' && (
                                <>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <Card title="Total Leads" icon="users"><div className="text-3xl font-bold">{stats.totalLeads}</div></Card>
                                        <Card title="Ações Abertas" icon="file-text"><div className="text-3xl font-bold text-indigo-500">{stats.totalProcessos}</div></Card>
                                        <Card title="Fechamentos" icon="target"><div className="text-3xl font-bold text-emerald-500">{stats.totalFechado}</div></Card>
                                        <Card title="Conversão" icon="trending-up"><div className="text-3xl font-bold text-amber-500">{stats.conversion}%</div></Card>
                                    </div>
                                    <Card title="Performance de Consultores">
                                        <div className="h-72">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={consultants}>
                                                    <CartesianGrid strokeDasharray="3 3" stroke={theme === 'dark' ? '#1e293b' : '#e2e8f0'} vertical={false} />
                                                    <XAxis dataKey="name" stroke="#64748b" fontSize={12} />
                                                    <YAxis stroke="#64748b" fontSize={12} />
                                                    <Tooltip contentStyle={{ backgroundColor: theme === 'dark' ? '#0f172a' : '#fff', borderRadius: '12px' }} />
                                                    <Legend />
                                                    <Bar dataKey="weeklyClosed" name="Semana" fill="#6366f1" radius={[6, 6, 0, 0]} />
                                                    <Bar dataKey="monthlyClosed" name="Mês" fill="#10b981" radius={[6, 6, 0, 0]} />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </Card>
                                </>
                            )}

                            {activeTab === 'bsc' && (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {/* Navegação de Mês */}
                                        <div className="flex items-center gap-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-3 rounded-2xl shadow-sm">
                                            <button onClick={() => { const d = new Date(currentBscMonth + "-01"); d.setMonth(d.getMonth() - 1); setCurrentBscMonth(d.toISOString().substring(0, 7)); }} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all"><Icon name="chevron-left" /></button>
                                            <span className="font-extrabold text-indigo-500 flex-1 text-center uppercase tracking-tighter text-sm">
                                                {new Date(currentBscMonth + "-02").toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })}
                                            </span>
                                            <button onClick={() => { const d = new Date(currentBscMonth + "-01"); d.setMonth(d.getMonth() + 1); setCurrentBscMonth(d.toISOString().substring(0, 7)); }} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all"><Icon name="chevron-right" /></button>
                                        </div>

                                        {/* Filtro de Unidade */}
                                        <div className="flex items-center gap-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-3 rounded-2xl shadow-sm">
                                            <Icon name="map-pin" className="text-slate-400 ml-2" size={18}/>
                                            <select 
                                                value={selectedBscState} 
                                                onChange={(e) => setSelectedBscState(e.target.value)} 
                                                className="bg-transparent border-none outline-none font-bold text-indigo-500 flex-1 appearance-none cursor-pointer"
                                            >
                                                {BRAZIL_STATES.map(uf => (
                                                    <option key={uf} value={uf} className="bg-white dark:bg-slate-900 text-slate-900 dark:text-white">
                                                        {uf === 'Geral' ? 'BRASIL (GERAL)' : `UNIDADE: ${uf}`}
                                                    </option>
                                                ))}
                                            </select>
                                        </div>

                                        <div className="flex gap-2">
                                            <button onClick={callGeminiAI} disabled={isAnalyzing} className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white p-3 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/20 active:scale-95 transition-all disabled:opacity-50 text-sm">
                                                <Icon name="sparkles" size={16} /> {isAnalyzing ? '...' : 'Analisar (IA)'}
                                            </button>
                                            <button onClick={() => { if(confirm("Deseja apagar os dados desta unidade no mês selecionado?")) setBscData(prev => { const n = {...prev}; if(n[currentBscMonth]) delete n[currentBscMonth][selectedBscState]; return n; }); }} className="bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white px-4 rounded-2xl font-bold border border-red-500/20"><Icon name="trash-2" size={16}/></button>
                                        </div>
                                    </div>

                                    {aiAdvice && (
                                        <div className="bg-indigo-600/5 border border-indigo-500/20 p-6 rounded-3xl animate-in slide-in-from-top-4">
                                            <div className="flex items-start gap-4">
                                                <Icon name="cpu" className="text-indigo-500" />
                                                <div className="flex-1 text-sm leading-relaxed whitespace-pre-wrap">{aiAdvice}</div>
                                                <button onClick={() => setAiAdvice(null)}><Icon name="x" size={14}/></button>
                                            </div>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        <Card title="Investimento" icon="dollar-sign"><div className="text-2xl font-bold">R$ {currentBsc.totalInv.toLocaleString('pt-BR')}</div></Card>
                                        <Card title="Leads Tráfego" icon="zap"><div className="text-2xl font-bold text-indigo-500">{currentBsc.leadsT}</div></Card>
                                        <Card title="CPL" icon="trending-down"><div className="text-2xl font-bold text-emerald-500">R$ {currentBsc.cpl.toFixed(2)}</div></Card>
                                        <Card title="CAC" icon="shopping-bag"><div className="text-2xl font-bold text-amber-500">R$ {currentBsc.cac.toFixed(2)}</div></Card>
                                    </div>

                                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl overflow-hidden shadow-sm transition-theme">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-slate-50 dark:bg-slate-800/50 text-[10px] uppercase font-bold tracking-widest text-slate-400">
                                                <tr>
                                                    <th className="px-8 py-6">Métrica Estratégica ({selectedBscState})</th>
                                                    <th className="px-8 py-6 text-center">Valor do Mês</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                                                {/* INVESTIMENTO */}
                                                <tr className="bg-indigo-500/5"><td colSpan="2" className="px-8 py-2 text-[10px] font-bold text-indigo-500 uppercase tracking-wider">Investimento Mensal</td></tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold">Investimento Meta (Empresa)</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.investmentMeta || ''} onChange={(e) => updateBscValue('investmentMeta', e.target.value)} className="w-40 mx-auto block bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-emerald-500 font-bold text-center outline-none" placeholder="R$ 0,00" /></td>
                                                </tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold">Investimento Google Ads</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.investmentGoogle || ''} onChange={(e) => updateBscValue('investmentGoogle', e.target.value)} className="w-40 mx-auto block bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-emerald-500 font-bold text-center outline-none" placeholder="R$ 0,00" /></td>
                                                </tr>
                                                
                                                {/* LEADS */}
                                                <tr className="bg-indigo-500/5"><td colSpan="2" className="px-8 py-2 text-[10px] font-bold text-indigo-500 uppercase tracking-wider">Captação de Leads</td></tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold">Leads Tráfego Pago</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.leadsTraffic || ''} onChange={(e) => updateBscValue('leadsTraffic', e.target.value)} className="w-40 mx-auto block bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-center outline-none" placeholder="0" /></td>
                                                </tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold">Leads Orgânico (Redes)</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.leadsOrganic || ''} onChange={(e) => updateBscValue('leadsOrganic', e.target.value)} className="w-40 mx-auto block bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-center outline-none" placeholder="0" /></td>
                                                </tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold">Qualificados Tráfego</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.qualTraffic || ''} onChange={(e) => updateBscValue('qualTraffic', e.target.value)} className="w-40 mx-auto block bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-center outline-none" placeholder="0" /></td>
                                                </tr>

                                                {/* FECHAMENTOS */}
                                                <tr className="bg-indigo-500/5"><td colSpan="2" className="px-8 py-2 text-[10px] font-bold text-indigo-500 uppercase tracking-wider">Fechamentos</td></tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold">Fechados via Tráfego</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.closedTraffic || ''} onChange={(e) => updateBscValue('closedTraffic', e.target.value)} className="w-40 mx-auto block bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-emerald-500 font-bold text-center outline-none" placeholder="0" /></td>
                                                </tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold">Fechados Orgânicos</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.closedOrganic || ''} onChange={(e) => updateBscValue('closedOrganic', e.target.value)} className="w-40 mx-auto block bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-emerald-500 font-bold text-center outline-none" placeholder="0" /></td>
                                                </tr>

                                                {/* REDES SOCIAIS E COMUNIDADE (RESTAURADO) */}
                                                <tr className="bg-indigo-500/5"><td colSpan="2" className="px-8 py-2 text-[10px] font-bold text-indigo-500 uppercase tracking-wider">Comunidade e Redes Sociais</td></tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold">Instagram (Seguidores)</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.ig || ''} onChange={(e) => updateBscValue('ig', e.target.value)} className="w-40 mx-auto block bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-center outline-none" placeholder="0" /></td>
                                                </tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold">TikTok (Seguidores)</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.tk || ''} onChange={(e) => updateBscValue('tk', e.target.value)} className="w-40 mx-auto block bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-center outline-none" placeholder="0" /></td>
                                                </tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold">Facebook (Seguidores)</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.fb || ''} onChange={(e) => updateBscValue('fb', e.target.value)} className="w-40 mx-auto block bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-center outline-none" placeholder="0" /></td>
                                                </tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold">YouTube (Inscritos)</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.yt || ''} onChange={(e) => updateBscValue('yt', e.target.value)} className="w-40 mx-auto block bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-center outline-none" placeholder="0" /></td>
                                                </tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold">Kwai (Seguidores)</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.kw || ''} onChange={(e) => updateBscValue('kw', e.target.value)} className="w-40 mx-auto block bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-center outline-none" placeholder="0" /></td>
                                                </tr>
                                                <tr className="bsc-table-row">
                                                    <td className="px-8 py-4 font-semibold text-indigo-500">Google Comentários (+)</td>
                                                    <td className="px-8 py-4"><input type="number" value={currentBsc.googlePositive || ''} onChange={(e) => updateBscValue('googlePositive', e.target.value)} className="w-40 mx-auto block bg-indigo-50 dark:bg-slate-950 border border-indigo-200 dark:border-indigo-900 rounded-xl px-4 py-2 text-indigo-500 font-bold text-center outline-none" placeholder="0" /></td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>

                                    {/* Comparador de Mês a Mês */}
                                    <Card title="Comparativo Evolutivo de Unidade" icon="git-compare">
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-end">
                                            <div className="grid grid-cols-2 gap-4 text-xs">
                                                <div className="space-y-1">
                                                    <label className="font-bold text-slate-500 uppercase">Mês Base</label>
                                                    <select value={bscComp1} onChange={(e) => setBscComp1(e.target.value)} className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 outline-none">
                                                        <option value="">Selecione...</option>
                                                        {Object.keys(bscData).sort().map(m => <option key={m} value={m}>{m}</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="font-bold text-slate-500 uppercase">Mês Comparação</label>
                                                    <select value={bscComp2} onChange={(e) => setBscComp2(e.target.value)} className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 outline-none">
                                                        <option value="">Selecione...</option>
                                                        {Object.keys(bscData).sort().map(m => <option key={m} value={m}>{m}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                            {bscComparison && (
                                                <div className="grid grid-cols-4 gap-2 text-[10px] text-center uppercase font-bold">
                                                    <div className={`p-2 rounded-lg border ${bscComparison.inv.diff <= 0 ? 'border-emerald-500/20 text-emerald-500' : 'border-red-500/20 text-red-500'}`}>Inv: {bscComparison.inv.percent}%</div>
                                                    <div className={`p-2 rounded-lg border ${bscComparison.leads.diff >= 0 ? 'border-emerald-500/20 text-emerald-500' : 'border-red-500/20 text-red-500'}`}>Leads: {bscComparison.leads.percent}%</div>
                                                    <div className={`p-2 rounded-lg border ${bscComparison.closed.diff >= 0 ? 'border-emerald-500/20 text-emerald-500' : 'border-red-500/20 text-red-500'}`}>Fech: {bscComparison.closed.percent}%</div>
                                                    <div className={`p-2 rounded-lg border ${bscComparison.cpl.diff <= 0 ? 'border-emerald-500/20 text-emerald-500' : 'border-red-500/20 text-red-500'}`}>CPL: {bscComparison.cpl.percent}%</div>
                                                </div>
                                            )}
                                        </div>
                                    </Card>
                                </div>
                            )}

                            {activeTab === 'input' && (
                                <div className="max-w-4xl mx-auto animate-in fade-in duration-500">
                                    <Card title="Novo Registro Diário Geral" icon="plus-circle">
                                        <div className="space-y-8">
                                            <input type="date" value={registrationDate} onChange={(e) => setRegistrationDate(e.target.value)} className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl py-4 px-6 outline-none focus:ring-2 focus:ring-indigo-500 font-bold" />
                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-6">
                                                {STATUS_OPTIONS.map(s => (
                                                    <div key={s.id} className="space-y-1">
                                                        <label className="text-[10px] text-slate-400 uppercase font-bold">{s.label}</label>
                                                        <input type="number" value={formData[s.id] || ''} onChange={(e) => setFormData({...formData, [s.id]: e.target.value === '' ? 0 : Number(e.target.value)})} className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-4 outline-none font-bold" placeholder="0" />
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 pt-4 border-t border-slate-100 dark:border-slate-800">
                                                {PROCESS_OPTIONS.map(p => (
                                                    <div key={p.id} className="space-y-1">
                                                        <label className="text-[9px] text-slate-500 uppercase font-bold truncate block">{p.label}</label>
                                                        <input type="number" value={formData[p.id] || ''} onChange={(e) => setFormData({...formData, [p.id]: e.target.value === '' ? 0 : Number(e.target.value)})} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg p-2 text-sm outline-none" placeholder="0" />
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={handleSaveRecord} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold py-5 rounded-2xl transition-all shadow-xl shadow-indigo-600/20">Confirmar Registro</button>
                                        </div>
                                    </Card>
                                </div>
                            )}

                            {activeTab === 'consultants' && (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    <Card title="Gestão da Equipe Comercial" icon="users">
                                        <div className="flex flex-col md:flex-row gap-4 mb-8">
                                            <input type="text" value={newConsultantName} onChange={(e) => setNewConsultantName(e.target.value)} placeholder="Nome do consultor..." className="flex-1 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl px-6 py-4 outline-none" />
                                            <button onClick={() => { if(!newConsultantName.trim()) return; setConsultants([...consultants, {name: newConsultantName.trim(), weeklyClosed:0, monthlyClosed:0}]); setNewConsultantName(''); }} className="bg-indigo-600 px-8 py-4 rounded-2xl font-bold">Adicionar Membro</button>
                                        </div>
                                        <div className="space-y-4">
                                            {consultants.map(c => (
                                                <div key={c.name} className="bg-white dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800 p-6 rounded-2xl flex flex-col md:flex-row items-center gap-8">
                                                    <div className="flex-1 font-extrabold text-lg">{c.name}</div>
                                                    <div className="flex gap-4">
                                                        <input type="number" value={c.weeklyClosed || ''} onChange={(e) => setConsultants(consultants.map(x => x.name === c.name ? {...x, weeklyClosed: Number(e.target.value)} : x))} className="w-20 bg-slate-50 dark:bg-slate-950 rounded-xl p-2 text-center" placeholder="Sem" />
                                                        <input type="number" value={c.monthlyClosed || ''} onChange={(e) => setConsultants(consultants.map(x => x.name === c.name ? {...x, monthlyClosed: Number(e.target.value)} : x))} className="w-20 bg-slate-50 dark:bg-slate-950 rounded-xl p-2 text-center" placeholder="Mês" />
                                                    </div>
                                                    <button onClick={() => setConsultants(consultants.filter(x => x.name !== c.name))} className="text-red-500 hover:bg-red-500/10 p-2 rounded-lg transition-colors"><Icon name="trash-2" size={18}/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </Card>
                                </div>
                            )}

                            {activeTab === 'compare' && (
                                <Card title="Histórico Detalhado">
                                    <div className="space-y-4">
                                        {data.map(item => (
                                            <div key={item.id} className="flex justify-between items-center p-4 border-b border-slate-100 dark:border-slate-800 hover:bg-indigo-500/5 transition-all rounded-xl">
                                                <div className="flex flex-col">
                                                    <span className="font-bold">{new Date(item.date).toLocaleDateString('pt-BR')}</span>
                                                    <span className="text-[10px] text-slate-400">REGISTRO GERAL</span>
                                                </div>
                                                <div className="flex gap-4 items-center">
                                                    <span className="text-emerald-500 font-bold px-3 py-1 bg-emerald-500/10 rounded-full text-xs">Fechados: {item.values.fechado}</span>
                                                    <button onClick={() => setData(data.filter(d => d.id !== item.id))} className="text-red-500 p-2 hover:bg-red-500/10 rounded-lg transition-colors"><Icon name="trash-2" size={16}/></button>
                                                </div>
                                            </div>
                                        ))}
                                        {data.length === 0 && <div className="py-20 text-center text-slate-500 italic">Sem registros diários para exibir.</div>}
                                    </div>
                                </Card>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
