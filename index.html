<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendasPro - Dashboard Executivo</title>
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bibliotecas Base (Ordem Crítica) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <!-- Recharts (Versão estável específica para evitar erros de ForwardRef) -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <!-- Babel e Ícones -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        
        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, 
            PieChart, Pie, Cell, AreaChart, Area 
        } = window.Recharts;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const STATUS_OPTIONS = [
            { id: 'aguardando', label: 'Aguardando Resposta', color: '#6366f1' },
            { id: 'fechado', label: 'Fechado', color: '#10b981' },
            { id: 'negociacao', label: 'Negociação', color: '#f59e0b' },
            { id: 'sem_dados', label: 'Sem Dados', color: '#64748b' },
            { id: 'sem_possibilidade', label: 'Sem Possibilidade', color: '#ef4444' },
            { id: 'visita', label: 'Visita Corriqueira', color: '#8b5cf6' },
        ];

        const PROCESS_OPTIONS = [
            { id: 'seguro_dpvat_ipa', label: 'SEGURO DPVAT (IPA)' },
            { id: 'seguro_dpvat_mac', label: 'SEGURO DPVAT (MAC/ÓBITO)' },
            { id: 'seguro_vida_ind', label: 'SEGURO DE VIDA (INDIVIDUAL)' },
            { id: 'seguro_vida_emp', label: 'SEGURO DE VIDA (EMPRESARIAL)' },
            { id: 'seguro_vida_obt', label: 'SEGURO DE VIDA (ÓBITO)' },
            { id: 'seguro_terceiro', label: 'SEGURO TERCEIRO' },
            { id: 'aux_doenca', label: 'AUX. DOENÇA' },
            { id: 'aux_acidente', label: 'AUX. ACIDENTE' },
            { id: 'aux_maternidade', label: 'AUX. MATERNIDADE' },
            { id: 'bpc_loas', label: 'BPC/LOAS' },
            { id: 'apos_invalidez', label: 'APOSENTADORIA POR INVALIDEZ' },
            { id: 'pensao_morte', label: 'PENSÃO POR MORTE' },
            { id: 'revisoes_dpvat', label: 'REVISÕES JUDICIAIS (DPVAT)' },
            { id: 'acao_transito', label: 'AÇÃO DE ACIDENTE DE TRÂNSITO' },
            { id: 'fraudes_pix', label: 'FRAUDES/GOLPES PIX' },
            { id: 'suspensao_cnh', label: 'SUSPENSÃO DE CNH E RECURSO DE MULTAS' },
            { id: 'inventario', label: 'INVENTÁRIO' },
            { id: 'revisoes_vida', label: 'REVISÕES JUDICIAIS (SEGURO DE VIDA)' },
            { id: 'revisoes_terc', label: 'REVISÕES JUDICIAIS (SEGURO TERCEIRO)' },
            { id: 'trabalhista', label: 'TRABALHISTA' },
            { id: 'seguro_vida_app', label: 'SEGURO DE VIDA (APLICATIVO)' },
            { id: 'resp_civil', label: 'AÇÃO DE RESPONSABILIDADE CIVIL' },
            { id: 'apos_idade', label: 'APOSENTADORIA POR IDADE' },
            { id: 'apos_tempo', label: 'APOSENTADORIA POR TEMPO DE SERVIÇO' },
            { id: 'reintegracao', label: 'REINTEGRAÇÃO DE POSSE' },
            { id: 'terceiro_judicial', label: 'TERCEIRO JUDICIAL' },
        ];

        const App = () => {
            const [data, setData] = useState([]);
            const [consultants, setConsultants] = useState([]);
            const [bscData, setBscData] = useState({});
            const [newConsultantName, setNewConsultantName] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [registrationDate, setRegistrationDate] = useState(new Date().toISOString().split('T')[0]);
            const [formData, setFormData] = useState({ aguardando: 0, fechado: 0, negociacao: 0, sem_dados: 0, sem_possibilidade: 0, visita: 0 });
            
            const [monthCompare1, setMonthCompare1] = useState("");
            const [monthCompare2, setMonthCompare2] = useState("");
            const [consCompare1, setConsCompare1] = useState("");
            const [consCompare2, setConsCompare2] = useState("");
            
            const [currentBscMonth, setCurrentBscMonth] = useState(new Date().toISOString().substring(0, 7));

            useEffect(() => {
                const savedData = localStorage.getItem('executive_dashboard_data');
                if (savedData) setData(JSON.parse(savedData));
                const savedConsultants = localStorage.getItem('executive_consultants');
                if (savedConsultants) setConsultants(JSON.parse(savedConsultants));
                const savedBsc = localStorage.getItem('executive_bsc_data');
                if (savedBsc) setBscData(JSON.parse(savedBsc));
            }, []);

            useEffect(() => { localStorage.setItem('executive_dashboard_data', JSON.stringify(data)); }, [data]);
            useEffect(() => { localStorage.setItem('executive_consultants', JSON.stringify(consultants)); }, [consultants]);
            useEffect(() => { localStorage.setItem('executive_bsc_data', JSON.stringify(bscData)); }, [bscData]);

            const handleSave = () => {
                const newEntry = {
                    id: Date.now(),
                    consultant: "Geral",
                    date: new Date(registrationDate + "T12:00:00").toISOString(),
                    values: { ...formData }
                };
                setData([newEntry, ...data]);
                setFormData({ aguardando: 0, fechado: 0, negociacao: 0, sem_dados: 0, sem_possibilidade: 0, visita: 0 });
                setActiveTab('dashboard');
            };

            const addConsultant = () => {
                if (!newConsultantName.trim()) return;
                const newC = {
                    name: newConsultantName.trim(),
                    weeklyClosed: 0,
                    monthlyClosed: 0
                };
                setConsultants([...consultants, newC]);
                setNewConsultantName('');
            };

            const updateConsultantValues = (name, field, value) => {
                setConsultants(consultants.map(c => c.name === name ? { ...c, [field]: Number(value) } : c));
            };

            const updateBscValue = (field, value) => {
                setBscData(prev => ({
                    ...prev,
                    [currentBscMonth]: {
                        ...prev[currentBscMonth],
                        [field]: Number(value) || 0
                    }
                }));
            };

            const bscValues = useMemo(() => {
                const values = bscData[currentBscMonth] || {};
                const investment = values.investment || 0;
                const leadsTraffic = values.leadsTraffic || 0;
                const leadsOrganic = values.leadsOrganic || 0;
                const totalLeads = leadsTraffic + leadsOrganic;
                
                const closedTraffic = values.closedTraffic || 0;
                const closedOrganic = values.closedOrganic || 0;
                const totalClosed = closedTraffic + closedOrganic;

                const cpl = leadsTraffic > 0 ? (investment / leadsTraffic) : 0;
                const cac = closedTraffic > 0 ? (investment / closedTraffic) : 0;

                return { 
                    ...values, investment, leadsTraffic, leadsOrganic, totalLeads, 
                    closedTraffic, closedOrganic, totalClosed, cpl, cac 
                };
            }, [bscData, currentBscMonth]);

            const stats = useMemo(() => {
                const totalFechado = data.reduce((acc, curr) => acc + Number(curr.values.fechado || 0), 0);
                const totalLeads = data.reduce((acc, curr) => {
                    let sum = 0;
                    STATUS_OPTIONS.forEach(s => sum += Number(curr.values[s.id] || 0));
                    return acc + sum;
                }, 0);
                const totalProcessos = data.reduce((acc, curr) => {
                    let sum = 0;
                    PROCESS_OPTIONS.forEach(p => sum += Number(curr.values[p.id] || 0));
                    return acc + sum;
                }, 0);
                const conversion = totalLeads > 0 ? ((totalFechado / totalLeads) * 100).toFixed(1) : 0;
                const top = [...consultants].sort((a, b) => b.monthlyClosed - a.monthlyClosed)[0];
                return { totalFechado, totalLeads, totalProcessos, conversion, topConsultant: top?.name || "N/A" };
            }, [data, consultants]);

            const statusTotals = useMemo(() => {
                const totals = STATUS_OPTIONS.map(s => ({ name: s.label, value: 0, color: s.color, id: s.id }));
                data.forEach(entry => {
                    STATUS_OPTIONS.forEach((opt, idx) => {
                        totals[idx].value += Number(entry.values[opt.id] || 0);
                    });
                });
                return totals.filter(t => t.value > 0);
            }, [data]);

            const processTotals = useMemo(() => {
                const totals = PROCESS_OPTIONS.map(p => ({ name: p.label, value: 0, id: p.id }));
                data.forEach(entry => {
                    PROCESS_OPTIONS.forEach((opt, idx) => {
                        totals[idx].value += Number(entry.values[opt.id] || 0);
                    });
                });
                return totals.filter(t => t.value > 0).sort((a, b) => b.value - a.value);
            }, [data]);

            const monthlyAggregation = useMemo(() => {
                const months = {};
                data.forEach(d => {
                    const monthKey = d.date.substring(0, 7);
                    if (!months[monthKey]) months[monthKey] = { label: monthKey, fechado: 0, processos: 0 };
                    months[monthKey].fechado += Number(d.values.fechado || 0);
                    PROCESS_OPTIONS.forEach(p => months[monthKey].processos += Number(d.values[p.id] || 0));
                });
                return months;
            }, [data]);

            const monthDiffResults = useMemo(() => {
                if (!monthCompare1 || !monthCompare2) return null;
                const m1 = monthlyAggregation[monthCompare1] || { fechado: 0 };
                const m2 = monthlyAggregation[monthCompare2] || { fechado: 0 };
                const diff = m2.fechado - m1.fechado;
                const percent = m1.fechado > 0 ? ((diff / m1.fechado) * 100).toFixed(1) : (m2.fechado > 0 ? 100 : 0);
                return { m1, m2, diff, percent };
            }, [monthlyAggregation, monthCompare1, monthCompare2]);

            const Card = ({ title, children, icon, className = "" }) => (
                <div className={`bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl ${className}`}>
                    <div className="flex items-center justify-between mb-4">
                        <h3 className="text-slate-400 font-medium text-sm uppercase tracking-wider">{title}</h3>
                        {icon && <Icon name={icon} className="text-indigo-500" />}
                    </div>
                    {children}
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 font-sans">
                    <nav className="fixed left-0 top-0 h-full w-20 md:w-64 bg-slate-900 border-r border-slate-800 flex flex-col z-50">
                        <div className="p-6 mb-8 flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg">
                                <Icon name="trending-up" className="text-white" />
                            </div>
                            <span className="hidden md:block font-bold text-xl tracking-tight">Vendas<span className="text-indigo-500">Pro</span></span>
                        </div>
                        <div className="flex-1 px-4 space-y-2">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: 'bar-chart-2' },
                                { id: 'consultants', label: 'Consultores', icon: 'users' },
                                { id: 'compare', label: 'Comparativo', icon: 'git-compare' },
                                { id: 'bsc', label: 'BSC Marketing', icon: 'pie-chart' },
                                { id: 'input', label: 'Novo Registro', icon: 'plus' },
                            ].map((item) => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-4 px-4 py-3 rounded-lg transition-all ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon name={item.icon} />
                                    <span className="hidden md:block font-medium">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="pl-20 md:pl-64 transition-all duration-300">
                        <header className="p-6 md:p-10">
                            <h1 className="text-3xl font-bold text-white">Relatório Executivo</h1>
                            <p className="text-slate-400 mt-1">Gestão de performance e processos.</p>
                        </header>

                        <div className="px-6 md:px-10 pb-10 space-y-8">
                            {activeTab === 'dashboard' && (
                                <>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                                        <Card title="Total Leads" icon="users"><div className="text-3xl font-bold">{stats.totalLeads}</div></Card>
                                        <Card title="Total Processos" icon="file-text"><div className="text-3xl font-bold text-indigo-400">{stats.totalProcessos}</div></Card>
                                        <Card title="Fechamentos" icon="target"><div className="text-3xl font-bold text-emerald-400">{stats.totalFechado}</div></Card>
                                        <Card title="Taxa Conversão" icon="trending-up"><div className="text-3xl font-bold text-indigo-400">{stats.conversion}%</div></Card>
                                        <Card title="Top Consultor" icon="award"><div className="text-xl font-bold text-amber-400 truncate">{stats.topConsultant}</div></Card>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        <Card title="Status Geral (Leads)" className="lg:col-span-1">
                                            <div className="h-64">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart>
                                                        <Pie data={statusTotals} innerRadius={60} outerRadius={80} paddingAngle={5} dataKey="value">
                                                            {statusTotals.map((e, i) => <Cell key={i} fill={e.color} />)}
                                                        </Pie>
                                                        <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #1e293b', borderRadius: '8px' }}/>
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </Card>
                                        <Card title="Desempenho Semanal/Mensal" className="lg:col-span-2">
                                            <div className="h-72">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <BarChart data={consultants}>
                                                        <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                                                        <XAxis dataKey="name" stroke="#64748b" />
                                                        <YAxis stroke="#64748b" />
                                                        <Tooltip cursor={{ fill: '#1e293b' }} contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #1e293b' }}/>
                                                        <Legend />
                                                        <Bar dataKey="weeklyClosed" name="Semana" fill="#6366f1" radius={[4, 4, 0, 0]} />
                                                        <Bar dataKey="monthlyClosed" name="Mês" fill="#10b981" radius={[4, 4, 0, 0]} />
                                                    </BarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </Card>
                                    </div>

                                    <Card title="Distribuição de Processos Geral" icon="file-text">
                                        <div className="h-96">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={processTotals} layout="vertical" margin={{ left: 150 }}>
                                                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" horizontal={false} />
                                                    <XAxis type="number" stroke="#64748b" />
                                                    <YAxis type="category" dataKey="name" stroke="#64748b" width={140} fontSize={10} />
                                                    <Tooltip cursor={{ fill: '#1e293b' }} contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #1e293b' }}/>
                                                    <Bar dataKey="value" name="Quantidade" fill="#8b5cf6" radius={[0, 4, 4, 0]} barSize={20} />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </Card>
                                </>
                            )}

                            {activeTab === 'bsc' && (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                        <div className="flex items-center gap-4 bg-slate-900 border border-slate-800 p-2 rounded-xl">
                                            <button 
                                                onClick={() => {
                                                    const d = new Date(currentBscMonth + "-01");
                                                    d.setMonth(d.getMonth() - 1);
                                                    setCurrentBscMonth(d.toISOString().substring(0, 7));
                                                }}
                                                className="p-2 hover:bg-slate-800 rounded-lg text-slate-400"
                                            >
                                                <Icon name="chevron-left" />
                                            </button>
                                            <span className="font-bold text-indigo-400 min-w-[120px] text-center uppercase">
                                                {new Date(currentBscMonth + "-02").toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })}
                                            </span>
                                            <button 
                                                onClick={() => {
                                                    const d = new Date(currentBscMonth + "-01");
                                                    d.setMonth(d.getMonth() + 1);
                                                    setCurrentBscMonth(d.toISOString().substring(0, 7));
                                                }}
                                                className="p-2 hover:bg-slate-800 rounded-lg text-slate-400"
                                            >
                                                <Icon name="chevron-right" />
                                            </button>
                                        </div>
                                        <div className="text-slate-400 text-sm">Dados salvos automaticamente por mês.</div>
                                    </div>

                                    {/* Principais KPIs do BSC */}
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        <Card title="Investimento" icon="dollar-sign">
                                            <div className="text-2xl font-bold">R$ {bscValues.investment.toLocaleString('pt-BR')}</div>
                                        </Card>
                                        <Card title="CPL (Custo por Lead)" icon="target">
                                            <div className="text-2xl font-bold text-indigo-400">R$ {bscValues.cpl.toFixed(2)}</div>
                                        </Card>
                                        <Card title="CAC (Custo Aquisição)" icon="shopping-bag">
                                            <div className="text-2xl font-bold text-emerald-400">R$ {bscValues.cac.toFixed(2)}</div>
                                        </Card>
                                        <Card title="Total Seguidores" icon="trending-up">
                                            <div className="text-2xl font-bold">
                                                {((bscValues.ig || 0) + (bscValues.tk || 0) + (bscValues.fb || 0) + (bscValues.yt || 0) + (bscValues.kw || 0)).toLocaleString()}
                                            </div>
                                        </Card>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        {/* Marketing e Leads */}
                                        <Card title="Métricas de Marketing" icon="activity">
                                            <div className="space-y-6">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="text-[10px] text-slate-500 uppercase font-bold">Investimento Tráfego</label>
                                                        <input type="number" value={bscValues.investment} onChange={(e) => updateBscValue('investment', e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded p-2 text-emerald-400 font-bold" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] text-slate-500 uppercase font-bold">Meta do Mês</label>
                                                        <input type="number" value={bscValues.meta} onChange={(e) => updateBscValue('meta', e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded p-2" />
                                                    </div>
                                                </div>
                                                <div className="pt-4 border-t border-slate-800">
                                                    <h4 className="text-xs font-bold text-indigo-400 mb-4 uppercase">Entrada de Leads</h4>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="text-[10px] text-slate-500 uppercase">Leads Tráfego</label>
                                                            <input type="number" value={bscValues.leadsTraffic} onChange={(e) => updateBscValue('leadsTraffic', e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded p-2" />
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] text-slate-500 uppercase">Leads Orgânico</label>
                                                            <input type="number" value={bscValues.leadsOrganic} onChange={(e) => updateBscValue('leadsOrganic', e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded p-2" />
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] text-slate-500 uppercase">Qualificados Tráfego</label>
                                                            <input type="number" value={bscValues.qualTraffic} onChange={(e) => updateBscValue('qualTraffic', e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded p-2" />
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] text-slate-500 uppercase">Fechados Tráfego</label>
                                                            <input type="number" value={bscValues.closedTraffic} onChange={(e) => updateBscValue('closedTraffic', e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded p-2" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </Card>

                                        {/* Redes Sociais */}
                                        <Card title="Social Media & Google" icon="share-2">
                                            <div className="space-y-4">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="text-[10px] text-slate-500 uppercase">Instagram</label>
                                                        <input type="number" value={bscValues.ig} onChange={(e) => updateBscValue('ig', e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded p-2" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] text-slate-500 uppercase">TikTok</label>
                                                        <input type="number" value={bscValues.tk} onChange={(e) => updateBscValue('tk', e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded p-2" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] text-slate-500 uppercase">Facebook</label>
                                                        <input type="number" value={bscValues.fb} onChange={(e) => updateBscValue('fb', e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded p-2" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] text-slate-500 uppercase">YouTube</label>
                                                        <input type="number" value={bscValues.yt} onChange={(e) => updateBscValue('yt', e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded p-2" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] text-slate-500 uppercase">Kawai</label>
                                                        <input type="number" value={bscValues.kw} onChange={(e) => updateBscValue('kw', e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded p-2" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] text-slate-500 uppercase text-indigo-400 font-bold">Comentários Google (+)</label>
                                                        <input type="number" value={bscValues.googlePositive} onChange={(e) => updateBscValue('googlePositive', e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded p-2 border-indigo-900" />
                                                    </div>
                                                </div>
                                            </div>
                                        </Card>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'consultants' && (
                                <div className="space-y-8 animate-in fade-in">
                                    <Card title="Gerenciar Consultores e Metas" icon="users">
                                        <div className="flex gap-4 mb-8">
                                            <input type="text" value={newConsultantName} onChange={(e) => setNewConsultantName(e.target.value)} placeholder="Nome do Consultor..." className="flex-1 bg-slate-950 border border-slate-800 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500" />
                                            <button onClick={addConsultant} className="bg-indigo-600 px-6 py-2 rounded-lg font-bold hover:bg-indigo-500 transition-all">Adicionar</button>
                                        </div>
                                        <div className="grid grid-cols-1 gap-4">
                                            {consultants.map(c => (
                                                <div key={c.name} className="bg-slate-800/50 border border-slate-700 p-4 rounded-xl flex flex-col md:flex-row items-center gap-6">
                                                    <div className="flex-1 font-bold text-lg text-indigo-300">{c.name}</div>
                                                    <div className="flex gap-4 items-center">
                                                        <label className="text-xs text-slate-400">Fechou na Semana:</label>
                                                        <input type="number" value={c.weeklyClosed} onChange={(e) => updateConsultantValues(c.name, 'weeklyClosed', e.target.value)} className="w-20 bg-slate-950 border border-slate-700 rounded px-2 py-1" />
                                                    </div>
                                                    <div className="flex gap-4 items-center">
                                                        <label className="text-xs text-slate-400">Fechou no Mês:</label>
                                                        <input type="number" value={c.monthlyClosed} onChange={(e) => updateConsultantValues(c.name, 'monthlyClosed', e.target.value)} className="w-20 bg-slate-950 border border-slate-700 rounded px-2 py-1" />
                                                    </div>
                                                    <button onClick={() => setConsultants(consultants.filter(x => x.name !== c.name))} className="text-red-400 hover:text-red-300"><Icon name="trash-2" size={18} /></button>
                                                </div>
                                            ))}
                                        </div>
                                    </Card>
                                </div>
                            )}

                            {activeTab === 'compare' && (
                                <div className="space-y-8 animate-in fade-in">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <Card title="Comparativo Mes a Mes" icon="calendar">
                                            <div className="space-y-4">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <select value={monthCompare1} onChange={(e) => setMonthCompare1(e.target.value)} className="bg-slate-950 border border-slate-800 rounded p-2 text-sm">
                                                        <option value="">Mês Base</option>
                                                        {Object.keys(monthlyAggregation).map(m => <option key={m} value={m}>{m}</option>)}
                                                    </select>
                                                    <select value={monthCompare2} onChange={(e) => setMonthCompare2(e.target.value)} className="bg-slate-950 border border-slate-800 rounded p-2 text-sm">
                                                        <option value="">Mês Comparação</option>
                                                        {Object.keys(monthlyAggregation).map(m => <option key={m} value={m}>{m}</option>)}
                                                    </select>
                                                </div>
                                                {monthDiffResults && (
                                                    <div className="pt-4 border-t border-slate-800">
                                                        <div className="flex justify-between items-center">
                                                            <span className="text-slate-400">Variação:</span>
                                                            <span className={`text-2xl font-bold ${monthDiffResults.diff >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                                                {monthDiffResults.diff >= 0 ? '+' : ''}{monthDiffResults.diff} ({monthDiffResults.percent}%)
                                                                <Icon name={monthDiffResults.diff >= 0 ? "trending-up" : "trending-down"} size={20} className="inline ml-2" />
                                                            </span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </Card>
                                        <Card title="Consultor vs Consultor" icon="users">
                                            <div className="space-y-4">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <select value={consCompare1} onChange={(e) => setConsCompare1(e.target.value)} className="bg-slate-950 border border-slate-800 rounded p-2 text-sm">
                                                        <option value="">Consultor 1</option>
                                                        {consultants.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                                                    </select>
                                                    <select value={consCompare2} onChange={(e) => setConsCompare2(e.target.value)} className="bg-slate-950 border border-slate-800 rounded p-2 text-sm">
                                                        <option value="">Consultor 2</option>
                                                        {consultants.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                                                    </select>
                                                </div>
                                                {consCompare1 && consCompare2 && (
                                                    <div className="pt-4 border-t border-slate-800 space-y-2">
                                                        {consultants.filter(c => c.name === consCompare1 || c.name === consCompare2).map(c => (
                                                            <div key={c.name} className="flex justify-between items-center">
                                                                <span className="text-slate-300 font-medium">{c.name}</span>
                                                                <span className="text-indigo-400 font-bold">Mês: {c.monthlyClosed} | Sem: {c.weeklyClosed}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        </Card>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'input' && (
                                <div className="max-w-4xl mx-auto animate-in fade-in">
                                    <Card title="Novo Registro Geral" icon="plus">
                                        <div className="space-y-8">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div className="space-y-2">
                                                    <label className="text-sm font-medium text-slate-400">Data do Registro</label>
                                                    <input type="date" value={registrationDate} onChange={(e) => setRegistrationDate(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 px-4 text-white outline-none focus:ring-2 focus:ring-indigo-500 transition-all" />
                                                </div>
                                            </div>
                                            <div className="pt-4 border-t border-slate-800">
                                                <h3 className="text-indigo-400 font-bold mb-6">Status dos Atendimentos</h3>
                                                <div className="grid grid-cols-2 md:grid-cols-3 gap-6">
                                                    {STATUS_OPTIONS.map(s => (
                                                        <div key={s.id} className="space-y-2">
                                                            <label className="text-xs text-slate-400 uppercase tracking-wider">{s.label}</label>
                                                            <input type="number" value={formData[s.id]} onChange={(e) => setFormData({...formData, [s.id]: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 outline-none" />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="pt-4 border-t border-slate-800">
                                                <h3 className="text-indigo-400 font-bold mb-6">Contagem de Processos</h3>
                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                    {PROCESS_OPTIONS.map(p => (
                                                        <div key={p.id} className="space-y-1">
                                                            <label className="text-[10px] text-slate-500 uppercase truncate block">{p.label}</label>
                                                            <input type="number" value={formData[p.id] || 0} onChange={(e) => setFormData({...formData, [p.id]: e.target.value})} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-sm" />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <button onClick={handleSave} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                                                <Icon name="save" /> Salvar Relatório
                                            </button>
                                        </div>
                                    </Card>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
